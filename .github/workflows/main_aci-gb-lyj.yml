# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - aci-gb-lyj

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crlyj.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8E0E69CCC1104349BF5BC3483DF30934 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_4DD7E7640A794C8C985FC21BA73BF2FD }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crlyj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8E0E69CCC1104349BF5BC3483DF30934 }}/crlyj/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2578866A15A4364AF1791441C7D2FD7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_113DAE866FBA41BB972C7BAB00CE9DAE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1D05324D501B4C0E9C875D0B0C123CAC }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'aci-gb-lyj'
          slot-name: 'Production'
          images: 'crlyj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8E0E69CCC1104349BF5BC3483DF30934 }}/crlyj/guestbook:${{ github.sha }}'
          