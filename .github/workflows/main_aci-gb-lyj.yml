# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - aci-gb-lyj

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crlyj.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E45A489C1F9D4E848C633B164B7CD04C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_27C6BA3A1CDD44FA9339DA68EC6F523D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crlyj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E45A489C1F9D4E848C633B164B7CD04C }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'aci-gb-lyj'
          slot-name: 'Production'
          images: 'crlyj.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E45A489C1F9D4E848C633B164B7CD04C }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E5FFAA7570CF4C518068003520D1020D }}